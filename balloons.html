<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Balloons ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

/* 🎈 balloons */
.balloon {
  position: absolute;
  font-size: clamp(70px, 11vw, 120px);
  cursor: pointer;
  animation: floatUp linear infinite;
  user-select: none;
  z-index: 2;
  transition: transform 0.2s;
}

.balloon:hover {
  transform: scale(1.15);
}

@keyframes floatUp {
  from { transform: translateY(110vh); }
  to { transform: translateY(-130vh); }
}

/* 💥 pop */
.pop {
  transform: scale(2);
  opacity: 0;
  transition: all 0.3s ease;
}

/* 💥 particles */
.particle {
  position: fixed;
  font-size: 20px;
  pointer-events: none;
  animation: explode 0.6s forwards;
}

@keyframes explode {
  to {
    transform: translate(var(--x), var(--y)) scale(0);
    opacity: 0;
  }
}

/* 💌 memory box */
#memoryBox {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  background: rgba(0,0,0,0.9);
  color: white;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  width: 85%;
  max-width: 350px;
  z-index: 10;
  opacity: 0;
  transition: 0.3s;
}

#memoryImg {
  width: 100%;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 8px 15px;
  border: none;
  border-radius: 20px;
  background: #ff4d6d;
  color: white;
}

/* ✨ glow background */
body::after {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,77,109,0.15), transparent);
  animation: glow 6s infinite alternate;
}

@keyframes glow {
  from { transform: scale(1); }
  to { transform: scale(1.2); }
}
</style>
</head>

<body>

<!-- 🎵 sound -->
<audio id="popSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<!-- 💌 memory -->
<div id="memoryBox">
  <img id="memoryImg">
  <p id="memoryText"></p>
  <button onclick="closeMemory()">Close ❤️</button>
</div>

<!-- 🎈 balloons (PUT YOUR REAL IMAGE NAMES HERE) -->
<div class="balloon" onclick="popBalloon(this,'IMG-20260331-WA0009.jpg','Our first memory ❤️')">🎈</div>

<div class="balloon" onclick="popBalloon(this,'IMG-20260402-WA0004.jpg','You make me smile 💖')">🎈</div>

<div class="balloon" onclick="popBalloon(this,'IMG-20260402-WA0006.jpg','I love you forever 🥺')">🎈</div>

<!-- 🎈 last balloon -->
<div class="balloon" onclick="goNext(this)">🎈</div>

<script>

// 🎯 perfect spread
let balloons = document.querySelectorAll(".balloon");

balloons.forEach((b, i) => {
  let gap = 100 / balloons.length;
  b.style.left = (i * gap + 5) + "vw";
  b.style.animationDuration = (6 + Math.random() * 5) + "s";
  b.style.animationDelay = (Math.random() * 6) + "s";
});


// 💥 particle explosion
function explode(x, y) {
  for (let i = 0; i < 8; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.innerHTML = "❤️";

    let angle = Math.random() * 2 * Math.PI;
    let dist = 60;

    p.style.setProperty("--x", Math.cos(angle)*dist + "px");
    p.style.setProperty("--y", Math.sin(angle)*dist + "px");

    p.style.left = x + "px";
    p.style.top = y + "px";

    document.body.appendChild(p);
    setTimeout(() => p.remove(), 600);
  }
}


// 🎈 pop balloon
function popBalloon(el, img, text) {

  let sound = document.getElementById("popSound");
  if (sound) sound.play().catch(()=>{});

  // 📱 vibration
  if (navigator.vibrate) navigator.vibrate(50);

  let rect = el.getBoundingClientRect();
  explode(rect.left, rect.top);

  el.classList.add("pop");
  setTimeout(() => el.remove(), 300);

  let box = document.getElementById("memoryBox");
  let imgEl = document.getElementById("memoryImg");
  let textEl = document.getElementById("memoryText");

  box.style.display = "block";

  setTimeout(() => {
    box.style.opacity = "1";
    box.style.transform = "translate(-50%, -50%) scale(1)";
  }, 50);

  imgEl.src = img;

  let i = 0;
  textEl.innerHTML = "";

  function type() {
    if (i < text.length) {
      textEl.innerHTML += text[i];
      i++;
      setTimeout(type, 35);
    }
  }

  type();
}


// ❌ close memory
function closeMemory() {
  let box = document.getElementById("memoryBox");
  box.style.opacity = "0";
  box.style.transform = "translate(-50%, -50%) scale(0.8)";
  setTimeout(() => box.style.display = "none", 300);
}


// 🎈 last balloon → cake
function goNext(el) {

  let sound = document.getElementById("popSound");
  if (sound) sound.play().catch(()=>{});

  if (navigator.vibrate) navigator.vibrate(80);

  el.classList.add("pop");

  setTimeout(() => {
    window.location.href = "cake.html";
  }, 500);
}

</script>

</body>
</html>
