<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Balloons ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

/* 🎈 balloons */
.balloon {
  position: absolute;
  font-size: clamp(70px, 11vw, 120px);
  cursor: pointer;
  animation: floatUp linear infinite;
  user-select: none;
  z-index: 2;
}

@keyframes floatUp {
  from { transform: translateY(110vh); }
  to { transform: translateY(-130vh); }
}

/* 💥 pop effect */
.pop {
  transform: scale(1.8);
  opacity: 0;
  transition: all 0.3s ease;
}

/* 💌 memory box */
#memoryBox {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  background: rgba(0,0,0,0.9);
  color: white;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  width: 85%;
  max-width: 350px;
  z-index: 10;
  opacity: 0;
  transition: 0.3s;
}

#memoryImg {
  width: 100%;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 8px 15px;
  border: none;
  border-radius: 20px;
  background: #ff4d6d;
  color: white;
}

/* ✨ background glow */
body::after {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,77,109,0.15), transparent);
  animation: glow 6s infinite alternate;
}

@keyframes glow {
  from { transform: scale(1); }
  to { transform: scale(1.2); }
}
</style>
</head>

<body>

<!-- 🎵 sound -->
<audio id="popSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<!-- 💌 memory -->
<div id="memoryBox">
  <img id="memoryImg">
  <p id="memoryText"></p>
  <button onclick="closeMemory()">Close ❤️</button>
</div>

<!-- 🎈 balloons -->
<div class="balloon" onclick="popBalloon(this,'pic1.jpg',')">🎈</div>
<div class="balloon" onclick="popBalloon(this,'pic2.jpg',')">🎈</div>
<div class="balloon" onclick="popBalloon(this,'pic3.jpg',')">🎈</div>
<div class="balloon" onclick="goNext(this)">🎈</div>

<script>

// 🎯 PERFECT SPREAD (no overlap)
let balloons = document.querySelectorAll(".balloon");

balloons.forEach((b, i) => {

  let gap = 100 / balloons.length;

  // horizontal spread
  b.style.left = (i * gap + 5) + "vw";

  // random speed
  b.style.animationDuration = (6 + Math.random() * 5) + "s";

  // different start time (IMPORTANT)
  b.style.animationDelay = (Math.random() * 6) + "s";
});


// 🎈 pop balloon
function popBalloon(el, img, text) {

  let sound = document.getElementById("popSound");
  if (sound) sound.play().catch(()=>{});

  el.classList.add("pop");
  setTimeout(() => el.remove(), 300);

  let box = document.getElementById("memoryBox");
  let imgEl = document.getElementById("memoryImg");
  let textEl = document.getElementById("memoryText");

  box.style.display = "block";

  setTimeout(() => {
    box.style.opacity = "1";
    box.style.transform = "translate(-50%, -50%) scale(1)";
  }, 50);

  imgEl.src = img;

  let i = 0;
  textEl.innerHTML = "";

  function type() {
    if (i < text.length) {
      textEl.innerHTML += text[i];
      i++;
      setTimeout(type, 35);
    }
  }

  type();
}


// ❌ close memory
function closeMemory() {
  let box = document.getElementById("memoryBox");
  box.style.opacity = "0";
  box.style.transform = "translate(-50%, -50%) scale(0.8)";

  setTimeout(() => {
    box.style.display = "none";
  }, 300);
}


// 🎈 last balloon → cake
function goNext(el) {

  let sound = document.getElementById("popSound");
  if (sound) sound.play().catch(()=>{});

  el.classList.add("pop");

  setTimeout(() => {
    window.location.href = "cake.html";
  }, 500);
}

</script>

</body>
</html>
