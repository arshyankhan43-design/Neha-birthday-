<script>

// 🎈 POP BALLOON → SHOW MEMORY + TYPING
function popBalloon(el, img, text) {
  document.getElementById("popSound").play();

  // 💥 pop animation
  el.classList.add("pop");
  setTimeout(() => {
    el.style.display = "none";
  }, 300);

  // 💌 show memory box
  let box = document.getElementById("memoryBox");
  box.style.display = "block";

  // 🖼 image
  document.getElementById("memoryImg").src = img;

  // 💌 typing effect
  let i = 0;
  let speed = 40;
  let textEl = document.getElementById("memoryText");
  textEl.innerHTML = "";

  function typeWriter() {
    if (i < text.length) {
      textEl.innerHTML += text.charAt(i);
      i++;
      setTimeout(typeWriter, speed);
    }
  }

  typeWriter();
}

// 🎈 LAST BALLOON → GO TO CAKE PAGE
function goNext(el) {
  document.getElementById("popSound").play();

  el.classList.add("pop");

  setTimeout(() => {
    window.location.href = "cake.html";
  }, 400);
}

</script>
