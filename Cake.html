<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cake ❤️</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  color: white;
  overflow: hidden;
}

/* 🎂 cake */
#cake {
  font-size: 120px;
  cursor: pointer;
  transition: 0.5s;
}

/* ✨ glow after cut */
.cut {
  transform: scale(1.3);
  text-shadow: 0 0 30px #ff4d6d;
}

/* 🎉 confetti */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  background: white;
  top: -10px;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
  }
}

/* text */
#msg {
  position: absolute;
  bottom: 80px;
  font-size: 20px;
}
</style>
</head>

<body>

<!-- 🎂 cake -->
<div id="cake" onclick="cutCake()">🎂</div>

<div id="msg">Tap the cake 🎂</div>

<!-- 🎵 sound -->
<audio id="cutSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>

function cutCake() {

  let cake = document.getElementById("cake");
  let msg = document.getElementById("msg");
  let sound = document.getElementById("cutSound");

  if (sound) sound.play().catch(()=>{});

  // 🎂 animation
  cake.classList.add("cut");
  cake.innerHTML = "🍰"; // change to slice

  msg.innerHTML = "Happy Birthday My Love ❤️";

  // 🎉 confetti
  for (let i = 0; i < 50; i++) {
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.animationDuration = (2 + Math.random()*3) + "s";
    document.body.appendChild(c);

    setTimeout(() => c.remove(), 4000);
  }

  // 💌 go to letter page
  setTimeout(() => {
    window.location.href = "letter.html";
  }, 3000);
}

</script>

</body>
</html>
