<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
  color: white;
}

/* VIDEO */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  filter: brightness(0.5);
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
}

#enterBtn {
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  background: #ff4d6d;
  color: white;
}

/* MAIN */
#main {
  display: none;
  text-align: center;
  padding-top: 60px;
}

/* NAME */
.names {
  font-size: 28px;
  font-weight: 600;
  animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #ff4d6d; }
  to { text-shadow: 0 0 25px #ff99ac; }
}

/* GIFT */
.gift-box {
  width: 120px;
  height: 120px;
  background: #ff4d6d;
  margin: 40px auto;
  border-radius: 10px;
  cursor: pointer;
  position: relative;
  transition: 0.3s;
}

.gift-box::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 20px;
  background: white;
  top: 40px;
}

.gift-box::after {
  content: "";
  position: absolute;
  width: 20px;
  height: 100%;
  background: white;
  left: 50px;
}

/* POPUP */
#popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: rgba(0,0,0,0.9);
  padding: 20px;
  border-radius: 20px;
  width: 85%;
  max-width: 320px;
  transition: 0.4s;
  z-index: 20;
}

#popup.show {
  transform: translate(-50%, -50%) scale(1);
}

#letter {
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
}

/* HEARTS */
.heart {
  position: fixed;
  font-size: 20px;
  animation: rise 5s linear infinite;
}

@keyframes rise {
  to {
    transform: translateY(-110vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
  <source src="https://cdn.coverr.co/videos/coverr-love-couple-sunset-5171/1080p.mp4">
</video>

<!-- INTRO -->
<div id="intro">
  <h1>For Someone Special ❤️</h1>
  <button id="enterBtn" onclick="enter()">Tap to Enter</button>
</div>

<!-- MAIN -->
<div id="main">
  <div class="names">Neha ❤️ You</div>
  <h2>Happy Birthday ❤️</h2>

  <div class="gift-box" onclick="openGift()"></div>
</div>

<!-- POPUP -->
<div id="popup">
  <p id="letter"></p>
</div>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a1b2b3.mp3">
</audio>

<script>

// ENTER SCREEN
function enter() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("main").style.display = "block";
}

// HEARTS
setInterval(() => {
  let h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "💖";
  h.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 5000);
}, 400);

// TYPEWRITER
function typeWriter(text, el) {
  el.innerHTML = "";
  let i = 0;

  function type() {
    if (i < text.length) {
      el.innerHTML += text[i];
      i++;
      setTimeout(type, 30);
    }
  }

  type();
}

// GIFT OPEN
function openGift() {

  document.querySelector(".gift-box").style.transform = "scale(0)";

  let popup = document.getElementById("popup");
  popup.classList.add("show");

  let music = document.getElementById("music");
  music.play();

  let text = `
My dear ❤️

You are my happiness 🌍
You are my peace 🫶
You are my everything 💖

Happy Birthday 🎂❤️

— Yours always
`;

  typeWriter(text, document.getElementById("letter"));
}

</script>

</body>
</html>
