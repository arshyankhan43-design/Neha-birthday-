<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For SomeoneSpecial ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* VIDEO BACKGROUND */
video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* INTRO SCREEN */
#intro {
  position: absolute;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* BUTTON */
button {
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: #ff4d6d;
  color: white;
  font-size: 18px;
  cursor: pointer;
  margin-top: 20px;
}

/* HEARTS */
  .heart {
  position: fixed;
  bottom: -20px;
  color: #ff4d6d;
  font-size: 20px;
  animation: rise 5s linear infinite;
  }

@keyframes rise {
  to {
    transform: translateY(-110vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline>
  <source src="https://cdn.coverr.co/videos/coverr-love-couple-sunset-5171/1080p.mp4">
</video>

<!-- INTRO -->
<div id="intro">
  <h1>For my dear sweetie cutie rasmali ❤️</h1>
  <button onclick="goNext()">Tap to Enter</button>
</div>

  <script>

/* ❤️ BUTTON CLICK → SMOOTH FADE + NEXT PAGE */
function goNext() {
  let intro = document.getElementById("intro");

  // smooth fade effect
  intro.style.transition = "opacity 0.5s";
  intro.style.opacity = "0";

  // go to balloons page
  setTimeout(() => {
    window.location.href = "balloons.html";
  }, 500);
}

/* 💖 FLOATING HEARTS */
setInterval(() => {
  let h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "❤️";
  h.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(h);

  setTimeout(() => h.remove(), 5000);
}, 400);

  </script>

</body>
</html>
