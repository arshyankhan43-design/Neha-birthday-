<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

.container {
  padding: 20px;
}

h1 {
  font-size: 32px;
}

.cake {
  font-size: 60px;
  animation: pop 1s infinite alternate;
}

@keyframes pop {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

.gift {
  font-size: 70px;
  cursor: pointer;
}

#typing {
  font-size: 18px;
  margin-top: 15px;
  min-height: 40px;
}

.slideshow img {
  width: 80%;
  max-width: 280px;
  border-radius: 15px;
  display: none;
  margin-top: 15px;
}

button {
  margin-top: 20px;
  padding: 12px 20px;
  border: none;
  border-radius: 20px;
  background: white;
  color: #ff4d6d;
  font-size: 16px;
}

.love-letter {
  margin-top: 20px;
  padding: 15px;
  background: rgba(255,255,255,0.2);
  border-radius: 15px;
  display: none;
  white-space: pre-wrap;
  text-align: left;
}

/* hearts */
.heart {
  position: fixed;
  font-size: 18px;
  animation: floatUp 1.5s linear forwards;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-120px); opacity: 0; }
}

/* fireworks */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}
</style>
</head>

<body>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a1b2b3.mp3">
</audio>

<canvas id="fireworks"></canvas>

<div class="container">

<h1>🎉 Happy Birthday Neha ❤️</h1>

<div class="cake">🎂</div>
<div class="gift" onclick="openGift()">🎁</div>

<div id="typing"></div>

<div class="slideshow">
  <!-- fallback images -->
  <img src="https://via.placeholder.com/300">
  <img src="https://via.placeholder.com/300">
  <img src="https://via.placeholder.com/300">
</div>

<button onclick="start()">Open My Heart 💌 + 🎵</button>

<div class="love-letter" id="letter"></div>

</div>

<script>

window.onload = function () {

// typing
let text = "You are my happiness ❤️";
let i = 0;

function type() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text[i];
    i++;
    setTimeout(type, 70);
  }
}
type();

// slideshow
let slides = document.querySelectorAll(".slideshow img");
let index = 0;

function show() {
  slides.forEach(s => s.style.display = "none");
  index++;
  if (index > slides.length) index = 1;
  slides[index - 1].style.display = "block";
  setTimeout(show, 2000);
}
show();

};

// hearts
document.addEventListener("click", e => {
  let h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "💖";
  h.style.left = e.clientX + "px";
  h.style.top = e.clientY + "px";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 1500);
});

// gift
function openGift() {
  alert("🎉 Surprise! Happy Birthday ❤️");
}

// typewriter
function typeWriter(text, el, speed = 35) {
  let i = 0;
  function typing() {
    if (i < text.length) {
      el.innerHTML += text[i];
      i++;
      setTimeout(typing, speed);
    }
  }
  typing();
}

// FIXED START FUNCTION
function start() {
  let letterBox = document.getElementById("letter");
  letterBox.style.display = "block";
  letterBox.innerHTML = "";

  // play music (mobile safe)
  let music = document.getElementById("music");
  music.play().catch(() => {});

  let letter = `
My dear ❤️

You are my happiness, my peace, my world 🌍

I will always choose you 🫶

Happy Birthday 🎂❤️

— Yours always
`;

  typeWriter(letter, letterBox);

  // 🔥 SCROLL FIX
  setTimeout(() => {
    letterBox.scrollIntoView({ behavior: "smooth" });
  }, 300);
}

// fireworks
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function boom(x, y) {
  for (let i = 0; i < 20; i++) {
    particles.push({
      x, y,
      dx: (Math.random() - 0.5) * 6,
      dy: (Math.random() - 0.5) * 6,
      alpha: 1
    });
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach((p, i) => {
    p.x += p.dx;
    p.y += p.dy;
    p.alpha -= 0.02;

    ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
    ctx.fillRect(p.x, p.y, 3, 3);

    if (p.alpha <= 0) particles.splice(i, 1);
  });

  requestAnimationFrame(animate);
}
animate();

document.addEventListener("click", e => boom(e.clientX, e.clientY));

</script>

</body>
</html>
