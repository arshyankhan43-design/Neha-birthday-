<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Neha ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
}

.container {
  padding: 30px;
}

h1 {
  font-size: 35px;
}

#typing {
  font-size: 22px;
  margin-top: 20px;
  min-height: 30px;
}

.slideshow img {
  width: 250px;
  border-radius: 20px;
  display: none;
  margin-top: 20px;
}

button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: white;
  color: #ff4d6d;
  font-size: 18px;
}

.love-letter {
  margin-top: 30px;
  background: rgba(255,255,255,0.2);
  padding: 20px;
  border-radius: 20px;
  display: none;
}

</style>
</head>

<body>

<div class="container">

<h1>Happy Birthday Neha Jaanu ❤️</h1>

<div id="typing"></div>

<!-- Slideshow -->
<div class="slideshow">
  <img src="neha1.jpg">
  <img src="neha2.jpg">
  <img src="neha3.jpg">
</div>

<button onclick="showLetter()">Open My Heart 💌</button>

<div class="love-letter" id="letter">
  <p>
  My dear Neha ❤️<br><br>
  From the day you came into my life, everything changed 💖  
  You are my happiness, my peace, my everything 🌍  
  I promise to always stand by you no matter what 🫶  
  I love you more than words can explain ❤️  
  <br><br>
  Happy Birthday my Jaanu 🎂💖
  </p>
</div>

</div>

<script>

// Typing animation
let text = "You are my happiness... ❤️";
let i = 0;

function typeEffect() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 80);
  }
}

typeEffect();

// Slideshow
let slideIndex = 0;
let slides = document.querySelectorAll(".slideshow img");

function showSlides() {
  slides.forEach(img => img.style.display = "none");
  slideIndex++;
  if (slideIndex > slides.length) slideIndex = 1;
  slides[slideIndex - 1].style.display = "block";
  setTimeout(showSlides, 2000);
}

showSlides();

// Show love letter
function showLetter() {
  document.getElementById("letter").style.display = "block";
}

</script>

</body>
</html>
