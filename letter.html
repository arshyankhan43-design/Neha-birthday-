<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: black;
  color: white;
  overflow: hidden;
  text-align: center;
}

.box {
  margin-top: 80px;
  padding: 20px;
}

h1 {
  font-size: 38px;
  margin-bottom: 20px;
  text-shadow: 0 0 10px #ff4d6d,
               0 0 20px #ff4d6d,
               0 0 40px #ff1a75;
}

#text {
  font-size: 18px;
  line-height: 1.7;
  white-space: pre-line;
  padding: 0 20px;
}

.heart {
  position: fixed;
  bottom: 0;
  font-size: 20px;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="box">
  <h1>💌 For You</h1>
  <div id="text"></div>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// 🎵 MUSIC (one tap)
const music = document.getElementById("music");

function playMusic() {
  music.volume = 0.5;
  music.play().then(() => {
    document.body.removeEventListener("click", playMusic);
  }).catch(() => {});
}

document.body.addEventListener("click", playMusic);

// ❤️ Floating hearts
setInterval(() => {
  let h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "❤️";
  h.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 6000);
}, 400);

// 💌 Typewriter
const msg =
"Hey ❤️\n\n" +
"Aaj tumhara special day hai 🎂✨\n\n" +
"Tum mere liye bohot special ho 💖\n\n" +
"Tumhari smile meri weakness hai 😊\n\n" +
"Main zyada bolta nahi...\n" +
"Par tum meri duniya ho ❤️\n\n" +
"Happy Birthday 🎉\n\n" +
"— Aru 😄❤️";

let i = 0;

function type() {
  if (i < msg.length) {
    document.getElementById("text").textContent += msg.charAt(i);
    i++;
    setTimeout(type, 120);
  }
}

type();
</script>

</body>
</html>
