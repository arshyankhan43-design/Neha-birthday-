<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Letter ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.box {
  max-width: 400px;
}

#text {
  font-size: 18px;
  white-space: pre-line;
}
</style>
</head>

<body>

<div class="box">
  <h1>💌 For You</h1>
  <div id="text"></div>
</div>

<script>
const msg =
"Hey ❤️\n\n" +
"You are my happiness 🌍\n" +
"You are my peace 🫶\n" +
"You are my everything 💖\n\n" +
"Happy Birthday 🎂🎉\n\n" +
"from your aru 😘";

let i = 0;

function type() {
  if (i < msg.length) {
    document.getElementById("text").innerHTML += msg.charAt(i);
    i++;
    setTimeout(type, 50);
  }
}

type();
</script>

</body>
</html>
