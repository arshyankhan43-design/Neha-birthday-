<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cake ❤️</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

/* 🌌 glow */
#bgGlow {
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,77,109,0.2), transparent);
  animation: moveGlow 8s infinite alternate;
}
@keyframes moveGlow {
  from { transform: scale(1); }
  to { transform: scale(1.3); }
}

/* 🎉 banner */
#banner {
  position: fixed;
  top: 10px;
  width: 100%;
  text-align: center;
  font-size: 22px;
  color: #ff4d6d;
  font-weight: bold;
  text-shadow: 0 0 20px #ff4d6d;
}

/* ⭐ stars */
.star {
  position: fixed;
  background: white;
  border-radius: 50%;
  animation: twinkle 2s infinite alternate;
}
@keyframes twinkle {
  from { opacity: 0.3; }
  to { opacity: 1; transform: scale(1.5); }
}

/* 🎂 REAL CAKE IMAGE */
#cakeBox {
  position: absolute;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
}

#cakeImg {
  width: clamp(250px, 70vw, 400px);
  filter: drop-shadow(0 0 40px #ff4d6d);
  animation: float 3s infinite ease-in-out;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

/* 🔥 candle flame */
.flame {
  position: absolute;
  top: -40px;
  left: 50%;
  transform: translateX(-50%);
  width: 14px;
  height: 26px;
  background: radial-gradient(circle, yellow, orange, red);
  border-radius: 50%;
  animation: flicker 0.15s infinite alternate;
}
@keyframes flicker {
  from { transform: translateX(-50%) scale(1); }
  to { transform: translateX(-50%) scale(1.2); }
}

/* 💨 blow */
.blow {
  animation: blowOut 0.6s forwards;
}
@keyframes blowOut {
  to {
    transform: translateX(-50%) scale(0);
    opacity: 0;
  }
}

/* ❤️ floating hearts */
.floating-heart {
  position: fixed;
  bottom: -20px;
  color: #ff4d6d;
  animation: floatUp linear forwards;
}
@keyframes floatUp {
  to {
    transform: translateY(-110vh);
    opacity: 0;
  }
}

/* 💥 explosion hearts */
.heart {
  position: fixed;
  font-size: 20px;
  animation: explode 1s forwards;
}
@keyframes explode {
  to {
    transform: translateY(-120px) scale(0);
    opacity: 0;
  }
}

/* 🎆 fireworks */
.firework {
  position: fixed;
  font-size: 24px;
  animation: up 1s linear forwards;
}
@keyframes up {
  to { transform: translateY(-300px); }
}

.blast {
  position: fixed;
  font-size: 28px;
  animation: blast 1s forwards;
}
@keyframes blast {
  to { transform: scale(2); opacity: 0; }
}

/* 🎤 button */
#startBtn {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  padding: 18px 60px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(45deg, #ff4d6d, #ff758f);
  color: white;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 0 25px #ff4d6d;
}
</style>
</head>

<body>

<div id="bgGlow"></div>

<div id="banner">🎉 Happy Birthday Neha ❤️ 🎉</div>

<!-- 🎂 REAL CAKE -->
<div id="cakeBox">
  <img id="cakeImg" src="cake.png">
  <div class="flame"></div>
</div>

<button id="startBtn">Start 🎤</button>

<script>

let blown = false;

/* ⭐ stars */
for (let i = 0; i < 50; i++) {
  let s = document.createElement("div");
  s.className = "star";
  s.style.width = "3px";
  s.style.height = "3px";
  s.style.left = Math.random()*100+"vw";
  s.style.top = Math.random()*100+"vh";
  document.body.appendChild(s);
}

/* ❤️ floating hearts */
setInterval(()=>{
  let h = document.createElement("div");
  h.className = "floating-heart";
  h.innerHTML = "❤️";
  h.style.left = Math.random()*100+"vw";
  h.style.animationDuration = (Math.random()*4+4)+"s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},300);

/* 🎆 fireworks */
function fireworks(){
  for(let i=0;i<4;i++){
    let f=document.createElement("div");
    f.className="firework";
    f.innerHTML="✨";
    f.style.left=(window.innerWidth/2 + Math.random()*300-150)+"px";
    f.style.top=window.innerHeight+"px";
    document.body.appendChild(f);

    setTimeout(()=>{
      for(let j=0;j<6;j++){
        let b=document.createElement("div");
        b.className="blast";
        b.innerHTML="💥";
        b.style.left=f.style.left;
        b.style.top=(window.innerHeight/2)+"px";
        document.body.appendChild(b);
        setTimeout(()=>b.remove(),1000);
      }
      f.remove();
    },800);
  }
}

/* 💥 blow */
function blowNow(){
  if(blown) return;
  blown=true;

  document.querySelector(".flame")?.classList.add("blow");

  fireworks();

  setTimeout(()=>{
    window.location.href="letter.html";
  },2500);
}

/* 🎤 mic */
function startMic(){
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    const ctx=new AudioContext();
    const mic=ctx.createMediaStreamSource(stream);
    const analyser=ctx.createAnalyser();
    mic.connect(analyser);

    const data=new Uint8Array(analyser.frequencyBinCount);

    function check(){
      analyser.getByteFrequencyData(data);
      let vol=data.reduce((a,b)=>a+b)/data.length;

      if(vol>20) blowNow();

      requestAnimationFrame(check);
    }
    check();
  }).catch(()=>{});
}

/* ✅ button fix */
window.onload=()=>{
  document.getElementById("startBtn").onclick=startMic;
};

/* ✅ tap anywhere */
document.body.addEventListener("click", blowNow);

</script>

</body>
</html>
