<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cake ❤️</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  color: white;
  flex-direction: column;
  overflow: hidden;
}

/* 🌌 background glow */
#bgGlow {
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,77,109,0.15), transparent);
  animation: moveGlow 8s infinite alternate;
}
@keyframes moveGlow {
  from { transform: scale(1); }
  to { transform: scale(1.2); }
}

/* 💖 name */
#nameGlow {
  position: absolute;
  top: 38%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 32px;
  font-weight: bold;
  color: #ff4d6d;
  text-shadow: 0 0 15px #ff4d6d, 0 0 30px #ff4d6d;
}

/* 🎂 cake */
#cake {
  font-size: 300px;
  margin-top: 60px;
  text-shadow: 0 0 40px #ff4d6d;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* ❤️ explosion */
.heart {
  position: fixed;
  color: #ff4d6d;
  font-size: 20px;
  animation: explode 1s ease-out forwards;
}
@keyframes explode {
  to {
    transform: translateY(-120px) scale(0);
    opacity: 0;
  }
}

/* message */
#msg {
  margin-top: 20px;
}

/* button */
#startBtn {
  margin-top: 25px;
  padding: 18px 50px;
  border-radius: 40px;
  border: none;
  background: linear-gradient(45deg, #ff4d6d, #ff758f);
  color: white;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 20px #ff4d6d;
}

  /* 🎬 zoom effect */
.zoom {
  transform: scale(1.6) !important;
  transition: transform 0.8s ease-in-out;
}
</style>
</head>

<body>

<div id="bgGlow"></div>

<div id="nameGlow"></div>

<div id="cake">🎂</div>

<div id="msg">Tap start to blow candles 🎤</div>
<button id="startBtn">Start 🎤</button>

<script>

/* 💖 NAME TYPING */
let text = "Happy Birthday Neha ❤️";
let i = 0;

function typeName() {
  if (i < text.length) {
    document.getElementById("nameGlow").innerHTML += text[i];
    i++;
    setTimeout(typeName, 200);
  }
}
typeName();

/* ❤️ HEART EXPLOSION */
function explodeHearts() {

  let cake = document.getElementById("cake");

  // 🎬 zoom first
  cake.classList.add("zoom");

  // wait for zoom animation
  setTimeout(() => {

    // 💥 hearts
    for (let i = 0; i < 30; i++) {
      let h = document.createElement("div");
      h.className = "heart";
      h.innerHTML = "❤️";

      h.style.left = (window.innerWidth/2 + (Math.random()*400-200)) + "px";
      h.style.top = (window.innerHeight/2) + "px";

      document.body.appendChild(h);
      setTimeout(() => h.remove(), 1000);
    }

  }, 800); // after zoom
}

/* 🎤 MIC */
let blown = false;

function startMic() {

  let btn = document.getElementById("startBtn");
  btn.innerHTML = "Listening...";
  btn.disabled = true;

  document.getElementById("msg").innerHTML = "Blow now 💨";

  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {

    const audioContext = new (window.AudioContext || window.webkitAudioContext)();

    if (audioContext.state === "suspended") {
      audioContext.resume();
    }

    const mic = audioContext.createMediaStreamSource(stream);
    const analyser = audioContext.createAnalyser();

    analyser.fftSize = 256;
    mic.connect(analyser);

    const data = new Uint8Array(analyser.frequencyBinCount);

    function check() {
      analyser.getByteFrequencyData(data);

      let volume = data.reduce((a,b)=>a+b)/data.length;

      if (volume > 25 && !blown) {
        blown = true;

        document.getElementById("msg").innerHTML = "Make a wish ❤️";

        explodeHearts();

        setTimeout(() => {
          window.location.href = "letter.html";
        }, 2500);
      }

      requestAnimationFrame(check);
    }

    check();

  }).catch(() => {

    document.getElementById("msg").innerHTML = "Tap anywhere 💨";

    document.body.onclick = () => {
      if (!blown) {
        blown = true;

        explodeHearts();

        setTimeout(() => {
          window.location.href = "letter.html";
        }, 2500);
      }
    };
  });
}

/* ✅ FORCE BUTTON CLICK WORK */
document.getElementById("startBtn").addEventListener("click", startMic);

</script>

</body>
</html>
