<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cake ❤️</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #1a0005, black);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  color: white;
  flex-direction: column;
  overflow: hidden;
}

/* 🌟 stars */
.star {
  position: fixed;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.6;
  animation: twinkle 2s infinite alternate;
}
@keyframes twinkle {
  from { opacity: 0.2; }
  to { opacity: 1; }
}

/* 💖 title */
#nameGlow {
  position: absolute;
  top: 25%;
  left: 50%;
  transform: translateX(-50%);
  font-size: clamp(50px, 8vw, 90px);
  font-weight: bold;
  text-align: center;
  color: #ff4d6d;
  text-shadow:
    0 0 20px #ff4d6d,
    0 0 40px #ff4d6d,
    0 0 80px rgba(255,77,109,0.9);
}

/* 🎂 cake */
#cake {
  font-size: clamp(300px, 55vw, 500px);
  margin-top: 50px;
  position: relative;
  text-shadow:
    0 0 40px #ff4d6d,
    0 0 80px rgba(255,77,109,0.8);
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

/* realistic glow under cake */
#cake::after {
  content: "";
  position: absolute;
  width: 250px;
  height: 100px;
  background: radial-gradient(circle, rgba(255,77,109,0.5), transparent);
  bottom: -30px;
  left: 50%;
  transform: translateX(-50%);
  filter: blur(30px);
  z-index: -1;
}

/* 🔥 flame realistic */
.flame {
  position: absolute;
  top: -70px;
  left: 50%;
  transform: translateX(-50%);
  width: 16px;
  height: 28px;
  background: radial-gradient(circle, #fff 10%, #ffd000, orange, red);
  border-radius: 50%;
  animation: flicker 0.12s infinite alternate;
}
@keyframes flicker {
  from { transform: translateX(-50%) scale(1); }
  to { transform: translateX(-50%) scale(1.3); }
}

/* 💨 blow fade */
.blow {
  animation: blowOut 0.7s forwards;
}
@keyframes blowOut {
  0% { opacity: 1; transform: translateX(-50%) scale(1); }
  100% { opacity: 0; transform: translateX(-50%) scale(0); }
}

/* 🎬 zoom */
.zoom {
  transform: scale(1.5);
  transition: 0.8s ease-in-out;
}

/* 💖 floating hearts everywhere */
.floatHeart {
  position: fixed;
  color: #ff4d6d;
  animation: floatUp linear forwards;
  pointer-events: none;
}
@keyframes floatUp {
  to {
    transform: translateY(-120vh);
    opacity: 0;
  }
}

/* 💥 explosion hearts */
.heart {
  position: fixed;
  color: #ff4d6d;
  font-size: 20px;
  animation: explode 1s forwards;
}
@keyframes explode {
  to {
    transform: translateY(-150px) scale(0);
    opacity: 0;
  }
}

/* 🎆 fireworks */
.firework {
  position: fixed;
  font-size: 22px;
  animation: boom 1.2s forwards;
}
@keyframes boom {
  to {
    transform: scale(2);
    opacity: 0;
  }
}

/* button */
#startBtn {
  position: fixed;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  padding: 18px 70px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(45deg, #ff4d6d, #ff758f);
  color: white;
  font-size: 22px;
  font-weight: bold;
  cursor: pointer;
  box-shadow:
    0 0 25px #ff4d6d,
    0 0 50px rgba(255,77,109,0.7);
  z-index: 10;
}
</style>
</head>

<body>

<div id="nameGlow">Happy Birthday Neha ❤️</div>

<div id="cake">
  🎂
  <div class="flame"></div>
</div>

<button id="startBtn">Start 🎤</button>

<script>

let blown = false;

/* 🌟 stars */
for (let i = 0; i < 100; i++) {
  let s = document.createElement("div");
  s.className = "star";
  s.style.left = Math.random() * window.innerWidth + "px";
  s.style.top = Math.random() * window.innerHeight + "px";
  document.body.appendChild(s);
}

/* 💖 floating hearts continuous */
setInterval(() => {
  let h = document.createElement("div");
  h.className = "floatHeart";
  h.innerHTML = "❤️";

  h.style.left = Math.random() * window.innerWidth + "px";
  h.style.fontSize = (Math.random() * 20 + 15) + "px";
  h.style.animationDuration = (Math.random() * 3 + 3) + "s";

  document.body.appendChild(h);
  setTimeout(() => h.remove(), 6000);
}, 300);

/* 🎆 fireworks */
function fireworks() {
  for (let i = 0; i < 20; i++) {
    let f = document.createElement("div");
    f.className = "firework";
    f.innerHTML = "✨";

    f.style.left = Math.random() * window.innerWidth + "px";
    f.style.top = Math.random() * (window.innerHeight/2) + "px";

    document.body.appendChild(f);
    setTimeout(() => f.remove(), 1200);
  }
}

/* 💥 explosion */
function explodeHearts() {
  for (let i = 0; i < 40; i++) {
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤️";

    h.style.left = (window.innerWidth/2 + (Math.random()*500-250)) + "px";
    h.style.top = (window.innerHeight/2) + "px";

    document.body.appendChild(h);
    setTimeout(() => h.remove(), 1000);
  }
}

/* 💨 MAIN ACTION */
function blowNow() {
  if (blown) return;
  blown = true;

  document.querySelector(".flame")?.classList.add("blow");
  document.getElementById("cake")?.classList.add("zoom");

  fireworks();

  setTimeout(() => {
    explodeHearts();
  }, 500);

  setTimeout(() => {
    window.location.href = "letter.html";
  }, 2300);
}

/* 🎤 mic */
function startMic(e) {
  e.stopPropagation(); // 🔥 FIX

  document.getElementById("startBtn").innerHTML = "Listening...";

  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    const ctx = new AudioContext();
    const mic = ctx.createMediaStreamSource(stream);
    const analyser = ctx.createAnalyser();

    mic.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);

    function check() {
      analyser.getByteFrequencyData(data);
      let vol = data.reduce((a,b)=>a+b)/data.length;

      if (vol > 20) blowNow();

      requestAnimationFrame(check);
    }
    check();
  }).catch(() => {
    blowNow();
  });
}

/* ✅ BUTTON WORK */
document.getElementById("startBtn").addEventListener("click", startMic);

/* ✅ TAP ANYWHERE */
document.body.addEventListener("click", blowNow);

</script>

</body>
</html>
