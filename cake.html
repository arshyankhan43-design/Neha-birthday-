<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cake ❤️</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

/* 🌌 glow */
#bgGlow {
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,77,109,0.25), transparent);
  animation: moveGlow 8s infinite alternate;
}
@keyframes moveGlow {
  from { transform: scale(1); }
  to { transform: scale(1.3); }
}

/* 🎉 BIG BANNER */
#banner {
  position: fixed;
  top: 5px;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 700px;
  z-index: 50;

  mix-blend-mode: screen;
  filter: drop-shadow(0 0 30px gold) brightness(1.2);

  animation: swing 3s ease-in-out infinite;
}
@keyframes swing {
  0% { transform: translateX(-50%) rotate(-2deg); }
  50% { transform: translateX(-50%) rotate(2deg); }
  100% { transform: translateX(-50%) rotate(-2deg); }
}

/* ⭐ stars */
.star {
  position: fixed;
  background: white;
  border-radius: 50%;
  animation: twinkle 2s infinite alternate;
}
@keyframes twinkle {
  from { opacity: 0.3; transform: scale(1); }
  to { opacity: 1; transform: scale(2); }
}

/* 🎂 cake */
#cakeBox {
  position: absolute;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1;
}

#cakeImg {
  width: clamp(300px, 80vw, 480px);
  border-radius: 20px;

  filter:
    drop-shadow(0 0 30px #ff4d6d)
    drop-shadow(0 0 80px rgba(255,77,109,0.5))
    brightness(1.1);

  animation: float 3s infinite ease-in-out;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

/* 🔥 flame */
.flame {
  position: absolute;
  top: 8%;
  left: 50%;
  transform: translateX(-50%);
  width: 14px;
  height: 26px;
  background: radial-gradient(circle, #fff176, orange, red);
  border-radius: 50%;
  filter: blur(1px);
  animation: flicker 0.1s infinite alternate;
}
@keyframes flicker {
  from { transform: translateX(-50%) scale(1); opacity: 1; }
  to { transform: translateX(-50%) scale(1.3); opacity: 0.7; }
}

/* 💨 blow */
.blow {
  animation: blowOut 0.6s forwards;
}
@keyframes blowOut {
  0% { transform: translateX(-50%) scale(1); opacity: 1; }
  100% { transform: translateX(-50%) scale(0); opacity: 0; }
}

/* ❤️ BIG FLOATING HEARTS */
.floating-heart {
  position: fixed;
  bottom: -20px;
  color: #ff4d6d;
  font-size: 45px;
  animation: floatUp linear forwards;
}
@keyframes floatUp {
  to {
    transform: translateY(-120vh);
    opacity: 0;
  }
}

/* 💥 EXPLOSION HEARTS */
.heart {
  position: fixed;
  font-size: 40px;
  animation: explode 1s forwards;
}
@keyframes explode {
  to {
    transform: scale(2.5) translateY(-150px);
    opacity: 0;
  }
}

/* 🎆 fireworks */
.spark {
  position: fixed;
  font-size: 30px;
  animation: blast 1s forwards;
}
@keyframes blast {
  to {
    transform: scale(3);
    opacity: 0;
  }
}

/* 🎤 button FIXED */
#startBtn {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  padding: 20px 80px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(45deg, #ff4d6d, #ff758f);
  color: white;
  font-size: 22px;
  cursor: pointer;
  box-shadow: 0 0 30px #ff4d6d;
  z-index: 999;
}
</style>
</head>

<body>

<div id="bgGlow"></div>

<!-- 🎉 JPG banner -->
<img id="banner" src="banner.jpg">

<div id="cakeBox">
  <!-- 🎂 JPG cake -->
  <img id="cakeImg" src="cake.jpg">
  <div class="flame"></div>
</div>

<button id="startBtn">Start 🎤</button>

<script>

let blown = false;

/* ⭐ stars */
for (let i = 0; i < 80; i++) {
  let s = document.createElement("div");
  s.className = "star";
  let size = Math.random()*5 + 2;
  s.style.width = size+"px";
  s.style.height = size+"px";
  s.style.left = Math.random()*100+"vw";
  s.style.top = Math.random()*100+"vh";
  document.body.appendChild(s);
}

/* ❤️ floating hearts */
setInterval(()=>{
  let h = document.createElement("div");
  h.className = "floating-heart";
  h.innerHTML = "💖";
  h.style.left = Math.random()*100+"vw";
  h.style.fontSize = (Math.random()*30 + 40) + "px";
  h.style.animationDuration = (Math.random()*3+4)+"s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},200);

/* 🎆 fireworks */
function fireworks(){
  for(let i=0;i<6;i++){
    let x = Math.random()*window.innerWidth;

    let rocket = document.createElement("div");
    rocket.innerHTML="✨";
    rocket.style.position="fixed";
    rocket.style.left=x+"px";
    rocket.style.bottom="0px";
    rocket.style.fontSize="30px";
    document.body.appendChild(rocket);

    setTimeout(()=>{
      rocket.style.transform="translateY(-80vh)";
      rocket.style.transition="1s linear";
    },50);

    setTimeout(()=>{
      rocket.remove();

      for(let j=0;j<25;j++){
        let s=document.createElement("div");
        s.className="spark";
        s.innerHTML="💥";
        s.style.left=x+"px";
        s.style.top="30%";
        s.style.transform=`translate(${Math.random()*300-150}px, ${Math.random()*300-150}px)`;
        document.body.appendChild(s);
        setTimeout(()=>s.remove(),1000);
      }

    },1000);
  }
}

/* 💥 blow */
function blowNow(){
  if(blown) return;
  blown=true;

  document.querySelector(".flame")?.classList.add("blow");

  fireworks();

  setTimeout(()=>{
    window.location.href="letter.html";
  },2500);
}

/* 🎤 mic */
function startMic(){
  let btn = document.getElementById("startBtn");
  btn.innerHTML = "Listening...";
  btn.disabled = true;

  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    const ctx=new AudioContext();
    const mic=ctx.createMediaStreamSource(stream);
    const analyser=ctx.createAnalyser();
    mic.connect(analyser);

    const data=new Uint8Array(analyser.frequencyBinCount);

    function check(){
      analyser.getByteFrequencyData(data);
      let vol=data.reduce((a,b)=>a+b)/data.length;

      if(vol>18) blowNow();

      requestAnimationFrame(check);
    }
    check();
  }).catch(()=>{
    document.body.onclick = blowNow;
  });
}

/* ✅ BUTTON WORKS 100% */
document.getElementById("startBtn").onclick = startMic;

/* ✅ TAP ANYWHERE */
document.body.addEventListener("click", blowNow);

</script>

</body>
</html>
