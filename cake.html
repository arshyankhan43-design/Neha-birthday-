<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cake ❤️</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  color: white;
  flex-direction: column;
  overflow: hidden;
}

/* 🌌 glow */
#bgGlow {
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,77,109,0.15), transparent);
  animation: moveGlow 8s infinite alternate;
}
@keyframes moveGlow {
  from { transform: scale(1); }
  to { transform: scale(1.2); }
}

/* 🌟 stars */
.star {
  position: fixed;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.7;
  animation: twinkle 2s infinite alternate;
}
@keyframes twinkle {
  from { opacity: 0.2; }
  to { opacity: 1; }
}

/* 💖 name */
#nameGlow {
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translateX(-50%);
  font-size: clamp(45px, 7vw, 75px);
  font-weight: bold;
  color: #ff4d6d;
  text-align: center;
  text-shadow: 0 0 20px #ff4d6d, 0 0 40px #ff4d6d, 0 0 80px rgba(255,77,109,0.9);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { transform: translateX(-50%) scale(1); }
  50% { transform: translateX(-50%) scale(1.05); }
}

/* 🎂 cake */
#cake {
  font-size: clamp(280px, 50vw, 450px);
  margin-top: 40px;
  position: relative;
  text-shadow: 0 0 40px #ff4d6d, 0 0 80px rgba(255,77,109,0.8);
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* ✨ cake glow aura */
#cake::after {
  content: "";
  position: absolute;
  width: 200px;
  height: 80px;
  background: radial-gradient(circle, rgba(255,77,109,0.5), transparent);
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  filter: blur(25px);
  z-index: -1;
}

/* 🔥 flame */
.flame {
  position: absolute;
  top: -60px;
  left: 50%;
  transform: translateX(-50%);
  width: 14px;
  height: 24px;
  background: radial-gradient(circle, #ffd000, orange, red);
  border-radius: 50%;
  animation: flicker 0.15s infinite alternate;
}
@keyframes flicker {
  from { transform: translateX(-50%) scale(1); }
  to { transform: translateX(-50%) scale(1.2); }
}

/* 💨 blow */
.blow {
  animation: blowOut 0.6s forwards;
}
@keyframes blowOut {
  0% { transform: translateX(-50%) scale(1); opacity: 1; }
  100% { transform: translateX(-50%) scale(0); opacity: 0; }
}

/* 🎬 zoom */
.zoom {
  transform: scale(1.6);
  transition: 0.8s;
}

/* 💖 floating hearts */
.floating-heart {
  position: fixed;
  bottom: -20px;
  color: #ff4d6d;
  animation: floatUp 6s linear forwards;
  pointer-events: none;
}
@keyframes floatUp {
  to {
    transform: translateY(-110vh);
    opacity: 0;
  }
}

/* ❤️ explosion */
.heart {
  position: fixed;
  color: #ff4d6d;
  font-size: 20px;
  animation: explode 1s forwards;
}
@keyframes explode {
  to {
    transform: translateY(-120px) scale(0);
    opacity: 0;
  }
}

/* button */
#startBtn {
  position: fixed;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  padding: 18px 70px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(45deg, #ff4d6d, #ff758f);
  color: white;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 25px #ff4d6d, 0 0 50px rgba(255,77,109,0.7);
  z-index: 10;
}
</style>
</head>

<body>

<div id="bgGlow"></div>

<div id="nameGlow">Happy Birthday Neha ❤️</div>

<div id="cake">
  🎂
  <div class="flame"></div>
</div>

<div id="msg" style="position:fixed; bottom:110px; width:100%; text-align:center;">
  Tap button OR screen 💨
</div>

<button id="startBtn">Start 🎤</button>

<script>

let blown = false;

/* 🌟 stars */
for (let i = 0; i < 80; i++) {
  let s = document.createElement("div");
  s.className = "star";
  s.style.left = Math.random() * window.innerWidth + "px";
  s.style.top = Math.random() * window.innerHeight + "px";
  document.body.appendChild(s);
}

/* 💖 floating hearts */
for (let i = 0; i < 40; i++) {
  let h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "❤️";

  // random position anywhere
  h.style.left = Math.random() * window.innerWidth + "px";
  h.style.top = Math.random() * window.innerHeight + "px";

  // random size
  h.style.fontSize = (Math.random() * 20 + 15) + "px";

  // random animation duration
  h.style.animationDuration = (Math.random() * 1 + 0.8) + "s";

  document.body.appendChild(h);

  setTimeout(() => h.remove(), 1200);
}

/* 🎊 confetti */
function confetti() {
  for (let i = 0; i < 30; i++) {
    let c = document.createElement("div");
    c.innerHTML = "🎊";
    c.style.position = "fixed";
    c.style.left = window.innerWidth/2 + "px";
    c.style.top = window.innerHeight/2 + "px";
    c.style.transform = `translate(${Math.random()*400-200}px, ${Math.random()*-300}px)`;
    c.style.transition = "1s";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 1000);
  }
}

/* 💥 main */
function blowNow() {
  if (blown) return;
  blown = true;

  document.querySelector(".flame")?.classList.add("blow");
  document.getElementById("cake")?.classList.add("zoom");

  confetti();

  setTimeout(() => {
    for (let i = 0; i < 30; i++) {
      let h = document.createElement("div");
      h.className = "heart";
      h.innerHTML = "❤️";

      h.style.left = (window.innerWidth/2 + (Math.random()*400-200)) + "px";
      h.style.top = (window.innerHeight/2) + "px";

      document.body.appendChild(h);
      setTimeout(() => h.remove(), 1000);
    }
  }, 500);

  setTimeout(() => {
    window.location.href = "letter.html";
  }, 2200);
}

/* 🎤 mic */
function startMic() {
  document.getElementById("startBtn").innerHTML = "Listening...";

  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    const ctx = new AudioContext();
    const mic = ctx.createMediaStreamSource(stream);
    const analyser = ctx.createAnalyser();

    mic.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);

    function check() {
      analyser.getByteFrequencyData(data);
      let vol = data.reduce((a,b)=>a+b)/data.length;

      if (vol > 20) blowNow();

      requestAnimationFrame(check);
    }
    check();
  });
}

/* ✅ FIX BUTTON */
document.getElementById("startBtn").addEventListener("click", startMic);

/* ✅ TAP ANYWHERE */
document.body.addEventListener("click", blowNow);

</script>

</body>
</html>
