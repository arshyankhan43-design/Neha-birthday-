<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cake ❤️</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  color: white;
  flex-direction: column;
  overflow: hidden;
}

/* 🌌 glow */
#bgGlow {
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,77,109,0.15), transparent);
  animation: moveGlow 8s infinite alternate;
}
@keyframes moveGlow {
  from { transform: scale(1); }
  to { transform: scale(1.2); }
}

/* 💖 name */
#nameGlow {
  position: absolute;
  top: 35%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
  color: #ff4d6d;
  text-shadow: 0 0 20px #ff4d6d;
}

/* 🎂 cake */
#cake {
  font-size: 260px;
  position: relative;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* 🔥 flame */
.flame {
  position: absolute;
  top: -60px;
  left: 50%;
  transform: translateX(-50%);
  width: 14px;
  height: 24px;
  background: radial-gradient(circle, #ffd000, orange, red);
  border-radius: 50%;
  animation: flicker 0.15s infinite alternate;
}
@keyframes flicker {
  from { transform: translateX(-50%) scale(1); }
  to { transform: translateX(-50%) scale(1.2); }
}

/* 💨 blow */
.blow {
  animation: blowOut 0.6s forwards;
}
@keyframes blowOut {
  0% { transform: translateX(-50%) scale(1); opacity: 1; }
  50% { transform: translateX(-50%) scale(1.4); opacity: 0.6; }
  100% { transform: translateX(-50%) scale(0); opacity: 0; }
}

/* 🎬 zoom */
.zoom {
  transform: scale(1.6);
  transition: 0.8s;
}

/* ❤️ hearts */
.heart {
  position: fixed;
  color: #ff4d6d;
  font-size: 20px;
  animation: explode 1s forwards;
}
@keyframes explode {
  to {
    transform: translateY(-120px) scale(0);
    opacity: 0;
  }
}

/* button */
#startBtn {
  margin-top: 25px;
  padding: 18px 50px;
  border-radius: 40px;
  border: none;
  background: linear-gradient(45deg, #ff4d6d, #ff758f);
  color: white;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 20px #ff4d6d;
}
</style>
</head>

<body>

<div id="bgGlow"></div>

<div id="nameGlow">Happy Birthday Neha ❤️</div>

<div id="cake">
  🎂
  <div class="flame"></div>
</div>

<div>Tap button OR screen 💨</div>
<button id="startBtn">Start 🎤</button>

<script>

let blown = false;

/* 💥 MAIN ACTION */
function blowNow() {
  if (blown) return;
  blown = true;

  let flame = document.querySelector(".flame");
  let cake = document.getElementById("cake");

  if (flame) flame.classList.add("blow");
  if (cake) cake.classList.add("zoom");

  setTimeout(() => {
    for (let i = 0; i < 30; i++) {
      let h = document.createElement("div");
      h.className = "heart";
      h.innerHTML = "❤️";

      h.style.left = (window.innerWidth/2 + (Math.random()*400-200)) + "px";
      h.style.top = (window.innerHeight/2) + "px";

      document.body.appendChild(h);
      setTimeout(() => h.remove(), 1000);
    }
  }, 500);

  setTimeout(() => {
    window.location.href = "letter.html";
  }, 2200);
}

/* 🎤 MIC (optional) */
function startMic() {

  let btn = document.getElementById("startBtn");
  btn.innerHTML = "Listening...";
  btn.disabled = true;

  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {

    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const mic = ctx.createMediaStreamSource(stream);
    const analyser = ctx.createAnalyser();

    mic.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);

    function check() {
      analyser.getByteFrequencyData(data);

      let vol = data.reduce((a,b)=>a+b)/data.length;

      if (vol > 20) {
        blowNow();
      }

      requestAnimationFrame(check);
    }

    check();

  }).catch(() => {
    // ignore mic error
  });
}

/* ✅ BUTTON FIX (100% WORKING) */
window.onload = () => {
  document.getElementById("startBtn").onclick = startMic;
};

/* ✅ TAP ANYWHERE WORKS */
document.body.addEventListener("click", () => {
  blowNow();
});

</script>

</body>
</html>
