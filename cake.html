<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cake ❤️</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

/* 🌌 glow */
#bgGlow {
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,77,109,0.2), transparent);
  animation: moveGlow 8s infinite alternate;
}
@keyframes moveGlow {
  from { transform: scale(1); }
  to { transform: scale(1.3); }
}

/* 🎉 REAL BANNER IMAGE */
#banner {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 500px;
  z-index: 20;
  filter: drop-shadow(0 0 20px gold);
  animation: swing 3s ease-in-out infinite;
}
@keyframes swing {
  0% { transform: translateX(-50%) rotate(-2deg); }
  50% { transform: translateX(-50%) rotate(2deg); }
  100% { transform: translateX(-50%) rotate(-2deg); }
}

/* ⭐ BIG SHINY STARS */
.star {
  position: fixed;
  background: white;
  border-radius: 50%;
  animation: twinkle 2s infinite alternate;
}
@keyframes twinkle {
  from { opacity: 0.3; transform: scale(1); }
  to { opacity: 1; transform: scale(1.8); }
}

/* 🎂 CAKE */
#cakeBox {
  position: absolute;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
}

#cakeImg {
  width: clamp(260px, 75vw, 420px);
  filter: drop-shadow(0 0 50px #ff4d6d);
  animation: float 3s infinite ease-in-out;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

/* 🔥 flame */
.flame {
  position: absolute;
  top: -50px;
  left: 50%;
  transform: translateX(-50%);
  width: 16px;
  height: 28px;
  background: radial-gradient(circle, #ffd000, orange, red);
  border-radius: 50%;
  animation: flicker 0.12s infinite alternate;
}
@keyframes flicker {
  from { transform: translateX(-50%) scale(1); }
  to { transform: translateX(-50%) scale(1.25); }
}

/* 💨 blow */
.blow {
  animation: blowOut 0.6s forwards;
}
@keyframes blowOut {
  to {
    transform: translateX(-50%) scale(0);
    opacity: 0;
  }
}

/* ❤️ BIG FLOATING HEARTS */
.floating-heart {
  position: fixed;
  bottom: -20px;
  color: #ff4d6d;
  font-size: 30px;
  animation: floatUp linear forwards;
}
@keyframes floatUp {
  to {
    transform: translateY(-110vh);
    opacity: 0;
  }
}

/* 💥 EXPLOSION HEARTS */
.heart {
  position: fixed;
  font-size: 26px;
  animation: explode 1s forwards;
}
@keyframes explode {
  to {
    transform: translateY(-150px) scale(0);
    opacity: 0;
  }
}

/* 🎆 BIG FIREWORKS */
.spark {
  position: fixed;
  font-size: 26px;
  animation: blast 0.8s forwards;
}
@keyframes blast {
  to {
    transform: scale(2.5);
    opacity: 0;
  }
}

/* 🎤 button */
#startBtn {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 18px 70px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(45deg, #ff4d6d, #ff758f);
  color: white;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 0 25px #ff4d6d;
  z-index: 10;
}
</style>
</head>

<body>

<div id="bgGlow"></div>

<!-- 🎉 USE YOUR IMAGE -->
<img id="banner" src="banner.png">

<div id="cakeBox">
  <img id="cakeImg" src="cake.png">
  <div class="flame"></div>
</div>

<button id="startBtn">Start 🎤</button>

<script>

let blown = false;

/* ⭐ stars */
for (let i = 0; i < 70; i++) {
  let s = document.createElement("div");
  s.className = "star";
  let size = Math.random()*4 + 2;
  s.style.width = size+"px";
  s.style.height = size+"px";
  s.style.left = Math.random()*100+"vw";
  s.style.top = Math.random()*100+"vh";
  document.body.appendChild(s);
}

/* ❤️ floating hearts everywhere */
setInterval(()=>{
  let h = document.createElement("div");
  h.className = "floating-heart";
  h.innerHTML = "💖";
  h.style.left = Math.random()*100+"vw";
  h.style.fontSize = (Math.random()*20+25)+"px";
  h.style.animationDuration = (Math.random()*3+4)+"s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},200);

/* 🎆 FIREWORKS FROM BOTTOM */
function fireworks(){
  for(let i=0;i<6;i++){
    let x = Math.random()*window.innerWidth;

    let rocket = document.createElement("div");
    rocket.innerHTML="✨";
    rocket.style.position="fixed";
    rocket.style.left=x+"px";
    rocket.style.bottom="0px";
    rocket.style.fontSize="30px";
    rocket.style.transition="1s linear";

    document.body.appendChild(rocket);

    setTimeout(()=>{
      rocket.style.transform="translateY(-70vh)";
    },50);

    setTimeout(()=>{
      rocket.remove();

      for(let j=0;j<20;j++){
        let s=document.createElement("div");
        s.className="spark";
        s.innerHTML="💥";
        s.style.left=x+"px";
        s.style.top="30%";
        s.style.transform=`translate(${Math.random()*200-100}px, ${Math.random()*200-100}px)`;
        document.body.appendChild(s);
        setTimeout(()=>s.remove(),800);
      }

    },1000);
  }
}

/* 💥 blow */
function blowNow(){
  if(blown) return;
  blown=true;

  document.querySelector(".flame")?.classList.add("blow");

  fireworks();

  setTimeout(()=>{
    window.location.href="letter.html";
  },2500);
}

/* 🎤 mic */
function startMic(){
  let btn = document.getElementById("startBtn");
  btn.innerHTML = "Listening...";

  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    const ctx=new AudioContext();
    const mic=ctx.createMediaStreamSource(stream);
    const analyser=ctx.createAnalyser();
    mic.connect(analyser);

    const data=new Uint8Array(analyser.frequencyBinCount);

    function check(){
      analyser.getByteFrequencyData(data);
      let vol=data.reduce((a,b)=>a+b)/data.length;

      if(vol>20) blowNow();

      requestAnimationFrame(check);
    }
    check();
  }).catch(()=>{
    // fallback if mic fails
    document.body.onclick = blowNow;
  });
}

/* ✅ BUTTON ALWAYS WORK */
window.addEventListener("load", ()=>{
  document.getElementById("startBtn").addEventListener("click", startMic);
});

/* ✅ TAP ANYWHERE */
document.body.addEventListener("click", blowNow);

</script>

</body>
</html>
