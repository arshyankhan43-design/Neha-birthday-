<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cake ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: radial-gradient(circle at top, #1a001f, #000000 70%);
}

/* 🌈 BACKGROUND */
.bgLight {
  position: fixed;
  width: 200%;
  height: 200%;
  filter: blur(120px);
  opacity: 0.4;
}
#pinkGlow { background: radial-gradient(circle,#ff4d6d,transparent 60%); animation: move1 10s infinite alternate; }
#purpleGlow { background: radial-gradient(circle,#a855f7,transparent 60%); animation: move2 14s infinite alternate; }
#blueGlow { background: radial-gradient(circle,#3b82f6,transparent 60%); animation: move3 18s infinite alternate; }

@keyframes move1 { from {transform:translate(-20%,-10%);} to {transform:translate(20%,20%) scale(1.3);} }
@keyframes move2 { from {transform:translate(30%,-20%);} to {transform:translate(-10%,30%) scale(1.4);} }
@keyframes move3 { from {transform:translate(-10%,30%);} to {transform:translate(25%,-15%) scale(1.5);} }

/* ⭐ stars */
.star {
  position: fixed;
  background: white;
  border-radius: 50%;
  animation: twinkle 2s infinite alternate;
}
@keyframes twinkle {
  from { opacity: 0.3; transform: scale(1); }
  to { opacity: 1; transform: scale(1.8); }
}

/* 🎉 banner */
#banner {
  position: fixed;
  top: 20px;
  width: 100%;
  text-align: center;
  font-size: clamp(28px,6vw,48px);
  color: #ff4d6d;
  font-weight: bold;
  text-shadow: 0 0 20px #ff4d6d,0 0 60px #ff4d6d;
}

/* 🎂 cake */
#cake {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: clamp(260px,50vw,420px);
  animation: float 3s infinite ease-in-out;
}
@keyframes float {
  0%,100% { transform: translate(-50%,-50%) translateY(0); }
  50% { transform: translate(-50%,-50%) translateY(-15px); }
}

/* 🔥 flame */
.flame {
  position: absolute;
  top: -70px;
  left: 50%;
  transform: translateX(-50%);
  width: 18px;
  height: 34px;
  background: radial-gradient(circle,#ffd000,orange,red);
  border-radius: 50%;
  animation: flicker 0.1s infinite alternate;
}

/* 💨 smoke */
.smoke {
  position: absolute;
  top: -80px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 20px;
  animation: smokeUp 2s forwards;
}
@keyframes smokeUp {
  to { transform: translate(-50%,-120px); opacity: 0; }
}

/* 🎆 fireworks */
.spark {
  position: fixed;
  animation: blast 1s forwards;
}
@keyframes blast {
  to { transform: translate(var(--x),var(--y)) scale(2.5); opacity: 0; }
}

/* ❤️ hearts */
.heart {
  position: fixed;
  font-size: 40px;
  animation: explode 1s forwards;
}
@keyframes explode {
  to { transform: translate(var(--x),var(--y)) scale(0); opacity: 0; }
}

/* 💖 floating hearts */
.floating-heart {
  position: fixed;
  bottom: -20px;
  animation: floatUp linear forwards;
}
@keyframes floatUp {
  to { transform: translateY(-110vh); opacity: 0; }
}

/* 🔘 BUTTON */
#startBtn {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  padding: 22px 90px;
  border-radius: 60px;
  border: none;
  background: linear-gradient(45deg,#ff4d6d,#ff758f,#ff4d6d);
  background-size: 200% 200%;
  color: white;
  font-size: clamp(18px,4.5vw,24px);
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 30px #ff4d6d;
  animation: gradientMove 4s infinite, pulse 2s infinite;
}
@keyframes gradientMove {
  0%{background-position:0%} 50%{background-position:100%} 100%{background-position:0%}
}
@keyframes pulse {
  0%{box-shadow:0 0 20px #ff4d6d;}
  50%{box-shadow:0 0 60px #ff4d6d;}
  100%{box-shadow:0 0 20px #ff4d6d;}
}
#startBtn:active { transform: translateX(-50%) scale(0.9); }

</style>
</head>

<body>

<div id="pinkGlow" class="bgLight"></div>
<div id="purpleGlow" class="bgLight"></div>
<div id="blueGlow" class="bgLight"></div>

<div id="banner">🎉 Happy Birthday Neha ❤️ 🎉</div>

<div id="cake">
  🎂
  <div class="flame"></div>
</div>

<button id="startBtn">Blow Candle 🎤</button>

<script>

let blown = false;

/* ⭐ stars */
for (let i = 0; i < 60; i++) {
  let s = document.createElement("div");
  s.className = "star";
  let size = Math.random()*4 + 2;
  s.style.width = size+"px";
  s.style.height = size+"px";
  s.style.left = Math.random()*100+"vw";
  s.style.top = Math.random()*100+"vh";
  document.body.appendChild(s);
}

/* 💖 floating hearts */
setInterval(()=>{
  let h=document.createElement("div");
  h.className="floating-heart";
  h.innerHTML="❤️";
  h.style.left=Math.random()*100+"vw";
  h.style.fontSize=(Math.random()*25+25)+"px";
  h.style.animationDuration=(Math.random()*3+4)+"s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},400);

/* 🎆 fireworks */
function fireworks(){
  for(let i=0;i<6;i++){
    let x=Math.random()*innerWidth;
    let y=Math.random()*innerHeight*0.5;

    setTimeout(()=>{
      for(let j=0;j<40;j++){
        let s=document.createElement("div");
        s.className="spark";
        s.innerHTML=["✨","💖","🎇","🌟"][Math.floor(Math.random()*4)];
        s.style.left=x+"px";
        s.style.top=y+"px";

        let angle=Math.random()*2*Math.PI;
        let dist=Math.random()*200+100;

        s.style.setProperty("--x",Math.cos(angle)*dist+"px");
        s.style.setProperty("--y",Math.sin(angle)*dist+"px");

        document.body.appendChild(s);
        setTimeout(()=>s.remove(),1000);
      }
    },i*300);
  }
}

/* ❤️ heart burst */
function hearts(){
  for(let i=0;i<30;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=innerWidth/2+"px";
    h.style.top=innerHeight/2+"px";

    let angle=Math.random()*2*Math.PI;
    let dist=Math.random()*300;

    h.style.setProperty("--x",Math.cos(angle)*dist+"px");
    h.style.setProperty("--y",Math.sin(angle)*dist+"px");

    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1000);
  }
}

/* 💨 blow */
function blowNow(){
  if(blown) return;
  blown=true;

  document.querySelector(".flame")?.remove();

  for(let i=0;i<6;i++){
    let s=document.createElement("div");
    s.className="smoke";
    s.innerHTML="💨";
    document.getElementById("cake").appendChild(s);
    setTimeout(()=>s.remove(),2000);
  }

  fireworks();
  setTimeout(hearts,500);

  setTimeout(()=>{
    window.location.href="letter.html";
  },2500);
}

/* 🎤 mic */
function startMic(){
  document.getElementById("startBtn").innerText="Blow now... 💨";

  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    const ctx=new AudioContext();
    const mic=ctx.createMediaStreamSource(stream);
    const analyser=ctx.createAnalyser();
    mic.connect(analyser);

    const data=new Uint8Array(analyser.frequencyBinCount);

    function check(){
      analyser.getByteFrequencyData(data);
      let vol=data.reduce((a,b)=>a+b)/data.length;

      if(vol>18) blowNow();
      requestAnimationFrame(check);
    }
    check();
  }).catch(blowNow);
}

document.getElementById("startBtn").onclick = startMic;

/* tap fallback */
document.body.addEventListener("click", blowNow);

</script>

</body>
</html>
