<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cake ❤️</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

/* 🌌 glow background */
#bgGlow {
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,77,109,0.25), transparent);
  animation: moveGlow 8s infinite alternate;
}
@keyframes moveGlow {
  from { transform: scale(1); }
  to { transform: scale(1.3); }
}

/* 🎉 BANNER UPGRADE */
#banner {
  position: fixed;
  top: 20px;
  width: 100%;
  text-align: center;
  font-size: clamp(28px, 6vw, 48px);
  color: #ff4d6d;
  font-weight: bold;
  animation: glowPulse 2s infinite alternate;
  text-shadow: 0 0 20px #ff4d6d, 0 0 60px #ff4d6d;
}
@keyframes glowPulse {
  from { text-shadow: 0 0 20px #ff4d6d; }
  to { text-shadow: 0 0 60px #ff4d6d, 0 0 100px #ff4d6d; }
}

/* ⭐ stars */
.star {
  position: fixed;
  background: white;
  border-radius: 50%;
  animation: twinkle 2s infinite alternate;
}
@keyframes twinkle {
  from { opacity: 0.3; transform: scale(1); }
  to { opacity: 1; transform: scale(1.8); }
}

/* 🎂 BIGGER CAKE */
#cake {
  position: absolute;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  font-size: clamp(220px, 40vw, 360px);
  text-shadow: 0 0 40px #ff4d6d, 0 0 100px rgba(255,77,109,0.8);
  animation: float 3s infinite ease-in-out;
}
@keyframes float {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-20px); }
}

/* 🔥 flame */
.flame {
  position: absolute;
  top: -70px;
  left: 50%;
  transform: translateX(-50%);
  width: 18px;
  height: 34px;
  background: radial-gradient(circle, #ffd000, orange, red);
  border-radius: 50%;
  animation: flicker 0.12s infinite alternate;
}
@keyframes flicker {
  from { transform: translateX(-50%) scale(1); }
  to { transform: translateX(-50%) scale(1.3); }
}

/* 💨 blow */
.blow {
  animation: blowOut 0.6s forwards;
}
@keyframes blowOut {
  to {
    transform: translateX(-50%) scale(0);
    opacity: 0;
  }
}

/* ❤️ floating hearts optimized */
.floating-heart {
  position: fixed;
  bottom: -20px;
  animation: floatUp linear forwards;
  pointer-events: none;
}
@keyframes floatUp {
  to {
    transform: translateY(-110vh);
    opacity: 0;
  }
}

/* 💥 explosion */
.heart {
  position: fixed;
  font-size: 40px;
  animation: explode 1s forwards;
}
@keyframes explode {
  to {
    transform: translateY(-150px) scale(0);
    opacity: 0;
  }
}

/* 🎆 fireworks */
.spark {
  position: fixed;
  font-size: 30px;
  animation: blast 0.8s forwards;
}
@keyframes blast {
  to {
    transform: scale(2.5);
    opacity: 0;
  }
}

/* 🎤 BUTTON FIXED */
#startBtn {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  padding: 24px 100px;
  border-radius: 60px;
  border: none;
  background: linear-gradient(45deg, #ff4d6d, #ff758f);
  color: white;
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 30px #ff4d6d;
  z-index: 999;
}
</style>
</head>

<body>

<div id="bgGlow"></div>

<div id="banner">🎉 Happy Birthday Neha ❤️ 🎉</div>

<div id="cake">
  🎂
  <div class="flame"></div>
</div>

<button id="startBtn">Start 🎤</button>

<script>

let blown = false;

/* ⭐ stars */
for (let i = 0; i < 60; i++) {
  let s = document.createElement("div");
  s.className = "star";
  let size = Math.random()*4 + 2;
  s.style.width = size+"px";
  s.style.height = size+"px";
  s.style.left = Math.random()*100+"vw";
  s.style.top = Math.random()*100+"vh";
  document.body.appendChild(s);
}

/* ❤️ smoother hearts */
setInterval(()=>{
  let h = document.createElement("div");
  h.className = "floating-heart";
  h.innerHTML = "🤎";
  h.style.left = Math.random()*100+"vw";
  h.style.fontSize = (Math.random()*25+25)+"px";
  h.style.animationDuration = (Math.random()*3+4)+"s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},300);

/* 🎆 fireworks */
function fireworks(){
  for(let i=0;i<5;i++){
    let x = Math.random()*window.innerWidth;

    setTimeout(()=>{
      for(let j=0;j<20;j++){
        let s=document.createElement("div");
        s.className="spark";
        s.innerHTML="✨";
        s.style.left=x+"px";
        s.style.top="30%";
        s.style.transform=`translate(${Math.random()*300-150}px, ${Math.random()*300-150}px)`;
        document.body.appendChild(s);
        setTimeout(()=>s.remove(),800);
      }
    }, i*200);
  }
}

/* 💥 blow */
function blowNow(){
  if(blown) return;
  blown=true;

  document.querySelector(".flame")?.classList.add("blow");

  fireworks();

  setTimeout(()=>{
    for(let i=0;i<25;i++){
      let h=document.createElement("div");
      h.className="heart";
      h.innerHTML="❤️";
      h.style.left=window.innerWidth/2+"px";
      h.style.top=window.innerHeight/2+"px";
      h.style.transform=`translate(${Math.random()*400-200}px, ${Math.random()*400-200}px)`;
      document.body.appendChild(h);
      setTimeout(()=>h.remove(),1000);
    }
  },500);

  setTimeout(()=>{
    window.location.href="letter.html";
  },2500);
}

/* 🎤 mic */
function startMic(){
  const btn = document.getElementById("startBtn");
  btn.innerHTML="Listening... 🎤";

  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    const ctx=new AudioContext();
    const mic=ctx.createMediaStreamSource(stream);
    const analyser=ctx.createAnalyser();
    mic.connect(analyser);

    const data=new Uint8Array(analyser.frequencyBinCount);

    function check(){
      analyser.getByteFrequencyData(data);
      let vol=data.reduce((a,b)=>a+b)/data.length;

      if(vol>18) blowNow();

      requestAnimationFrame(check);
    }
    check();
  }).catch(()=>{
    blowNow();
  });
}

/* button */
window.onload = () => {
  document.getElementById("startBtn").onclick = startMic;
};

/* tap fallback */
document.body.addEventListener("click", blowNow);

</script>

</body>
</html>
