<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cake ❤️</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  color: white;
  flex-direction: column;
  overflow: hidden;
}

/* 🌑 DARK ROOM OVERLAY */
#roomGlow {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, rgba(255,140,0,0.25), black 70%);
  pointer-events: none;
  transition: 0.5s;
}

/* 🎂 cake */
#cake {
  font-size: 160px;
  position: relative;
  z-index: 2;
}

/* 🕯️ candle */
.candle {
  position: absolute;
  top: -60px;
  font-size: 30px;
}

/* 🔥 flame */
.flame {
  position: relative;
  display: inline-block;
  color: orange;
  animation: flicker 0.15s infinite alternate;
}

/* ✨ glow light */
.flame::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 30px;
  height: 30px;
  background: radial-gradient(circle, rgba(255,160,0,0.9), transparent);
  transform: translate(-50%, -50%);
  border-radius: 50%;
  filter: blur(10px);
  animation: glow 0.2s infinite alternate;
}

@keyframes flicker {
  from { transform: scale(1) rotate(-2deg); opacity: 1; }
  to { transform: scale(1.2) rotate(2deg); opacity: 0.8; }
}

@keyframes glow {
  from { opacity: 0.6; }
  to { opacity: 1; }
}

/* message */
#msg {
  margin-top: 20px;
  font-size: 18px;
  z-index: 2;
}
</style>
</head>

<body>

<!-- 🌑 room glow -->
<div id="roomGlow"></div>

<!-- 🎂 cake -->
<div id="cake">
  🎂
  <div class="candle" style="left:-30px;"><span class="flame">🔥</span></div>
  <div class="candle" style="left:0px;"><span class="flame">🔥</span></div>
  <div class="candle" style="left:30px;"><span class="flame">🔥</span></div>
</div>

<div id="msg">Blow the candles 🕯️💨</div>

<script>

let blown = false;

// 🎤 mic
navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {

  const audioContext = new (window.AudioContext || window.webkitAudioContext)();
  const mic = audioContext.createMediaStreamSource(stream);
  const analyser = audioContext.createAnalyser();

  mic.connect(analyser);
  const data = new Uint8Array(analyser.frequencyBinCount);

  function checkBlow() {
    analyser.getByteFrequencyData(data);

    let volume = data.reduce((a, b) => a + b) / data.length;

    if (volume > 60 && !blown) {
      blown = true;

      // 💨 blow candles
      document.querySelectorAll(".flame").forEach(f => {
        f.innerHTML = "💨";
        f.style.animation = "none";
      });

      // 🌑 room becomes darker
      document.getElementById("roomGlow").style.background =
        "radial-gradient(circle at center, rgba(0,0,0,0.1), black 80%)";

      document.getElementById("msg").innerHTML = "Make a wish ❤️";

      setTimeout(() => {
        window.location.href = "letter.html";
      }, 2500);
    }

    requestAnimationFrame(checkBlow);
  }

  checkBlow();

}).catch(() => {

  document.getElementById("msg").innerHTML = "Tap to blow candles 🕯️";

  document.body.onclick = () => {
    document.querySelectorAll(".flame").forEach(f => f.innerHTML = "💨");

    document.getElementById("roomGlow").style.background =
      "radial-gradient(circle at center, rgba(0,0,0,0.1), black 80%)";

    setTimeout(() => {
      window.location.href = "letter.html";
    }, 2000);
  };
});

</script>

</body>
</html>
