<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cake ❤️</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  color: white;
  flex-direction: column;
  overflow: hidden;
}

/* 🌌 background glow */
#bgGlow {
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,77,109,0.15), transparent);
  animation: moveGlow 8s infinite alternate;
}

@keyframes moveGlow {
  from { transform: scale(1); }
  to { transform: scale(1.2); }
}

/* 💖 name */
#nameGlow {
  position: absolute;
  top: 12%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 34px;
  font-weight: bold;
  z-index: 2;
  color: #ff4d6d;

  text-shadow:
    0 0 10px #ff4d6d,
    0 0 20px #ff4d6d,
    0 0 40px #ff4d6d,
    0 0 80px rgba(255,77,109,0.8);
}

/* ✨ sparkle */
.sparkle {
  position: fixed;
  color: #ff4d6d;
  font-size: 14px;
  animation: sparkleAnim 1s linear forwards;
  pointer-events: none;
}

@keyframes sparkleAnim {
  to {
    transform: translateY(-30px) scale(0);
    opacity: 0;
  }
}

/* 🎂 cake */
#cake {
  font-size: 170px;
  position: relative;
  z-index: 2;
}

/* 🕯️ candle */
.candle {
  position: absolute;
  top: -60px;
  font-size: 30px;
}

/* 🔥 flame */
.flame {
  color: orange;
  animation: flicker 0.15s infinite alternate;
}

.flame::after {
  content: "";
  position: absolute;
  width: 30px;
  height: 30px;
  background: radial-gradient(circle, rgba(255,160,0,0.9), transparent);
  border-radius: 50%;
  filter: blur(10px);
}

@keyframes flicker {
  from { transform: scale(1); }
  to { transform: scale(1.2); }
}

#msg {
  margin-top: 20px;
}

#startBtn {
  margin-top: 10px;
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: #ff4d6d;
  color: white;
}
</style>
</head>

<body>

<div id="bgGlow"></div>

<div id="nameGlow"></div>

<div id="cake">
  🎂
  <div class="candle" style="left:-30px;"><span class="flame">🔥</span></div>
  <div class="candle" style="left:0px;"><span class="flame">🔥</span></div>
  <div class="candle" style="left:30px;"><span class="flame">🔥</span></div>
</div>

<div id="msg">Tap start to blow candles 🎤</div>
<button id="startBtn" onclick="startMic()">Start 🎤</button>

<script>

/* 💖 NAME TYPING */
let text = "Neha ❤️";
let index = 0;

function typeName() {
  if (index < text.length) {
    let el = document.getElementById("nameGlow");
    el.innerHTML += text[index];

    // ✨ sparkle effect on each letter
    let rect = el.getBoundingClientRect();
    for (let i = 0; i < 3; i++) {
      let s = document.createElement("div");
      s.className = "sparkle";
      s.innerHTML = "✨";

      s.style.left = rect.left + Math.random()*rect.width + "px";
      s.style.top = rect.top + "px";

      document.body.appendChild(s);
      setTimeout(() => s.remove(), 1000);
    }

    index++;
    setTimeout(typeName, 120);
  }
}

setTimeout(typeName, 800);


/* 🎤 MIC LOGIC */
let blown = false;

function startMic() {

  document.getElementById("startBtn").style.display = "none";
  document.getElementById("msg").innerHTML = "Blow the candles 🕯️💨";

  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {

    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const mic = audioContext.createMediaStreamSource(stream);
    const analyser = audioContext.createAnalyser();

    mic.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);

    function checkBlow() {
      analyser.getByteFrequencyData(data);

      let volume = data.reduce((a, b) => a + b) / data.length;

      if (volume > 50 && !blown) {
        blown = true;

        document.querySelectorAll(".flame").forEach(f => {
          f.innerHTML = "💨";
        });

        document.getElementById("msg").innerHTML = "Make a wish ❤️";

        setTimeout(() => {
          window.location.href = "letter.html";
        }, 2500);
      }

      requestAnimationFrame(checkBlow);
    }

    checkBlow();

  }).catch(() => {

    document.getElementById("msg").innerHTML = "Tap anywhere to blow 🕯️";

    document.body.onclick = () => {
      document.querySelectorAll(".flame").forEach(f => f.innerHTML = "💨");
      setTimeout(() => {
        window.location.href = "letter.html";
      }, 2000);
    };
  });
}

</script>

</body>
</html>
